server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/inventario_db
    username: postgres
    password: adminadmin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    default-property-inclusion: non_null
